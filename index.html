<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站</title>
    <!-- 引入CSS样式文件 -->
    <link rel="stylesheet" href="style.css">
    <!-- 引入图标库（可选，美化按钮/图标） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">HOUSE-DESIGHN</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于我们</a></li>
                <li><a href="#services">服务</a></li>
                <li><a href="#contact">联系我们</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主页横幅 -->
    <section id="home" class="hero">
        <div class="container">
            <h1>昊思设计工程有限公司</h1>
            <p>HOUSE-SPACE-DESIGN</p>
<!-- 悬浮小窗代码 START -->
            <div class="btn-wrapper">            
<button class="btn" onclick="showMessageAndFloat(event)">主理人-13585644471</button>
            <div id="floatImage" class="float-img">
                <!-- 替换为你的图片路径，也可用在线测试图 -->
                <img src="images/二维码.png" alt="主理人-13585644471" style="width:200px; border-radius:8px;">
            </div>
        </div>
    </section>

    <!-- 关于我们 -->
    <section id="about" class="about">
        <div class="container">
            <h2>关于我们</h2>
            <p>  一个专注于【室内住宅、办公空间、商业空间】等多领域的设计公司</p>
            <div class="about-cards">
                <div class="card">
                    <i class="fas fa-code"></i>
                    <h3>住宅室内空间</h3>
                    <p> Residential Interior Space</p>
                </div>
                <div class="card">
                    <i class="fas fa-mobile-alt"></i>
                    <h3>办公空间</h3>
                    <p>Office Space</p>
                </div>
                <div class="card">
                    <i class="fas fa-paint-brush"></i>
                    <h3>商业空间</h3>
                    <p>Commercial Space</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系表单 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系我们</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name：</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone：</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="email">Email：</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message：</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">提交</button>
            </form>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 -House Space Design 昊思设计- 保留所有权利</p>
        </div>
    </footer>

    <!-- 引入JavaScript文件 -->
    <script src="script.js"></script>
</body>
</html>
